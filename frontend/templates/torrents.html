<div class="row g-4">
    {% for torrent in torrents %}
        <div class="col-12 col-md-6 col-lg-4">
            <div class="torrent-card d-flex flex-column h-100">
                <div class="card-header-accent"></div>
                <div class="p-4 flex-grow-1">
                    <a href="{{ url_for('serve_torrent', category=torrent.category, filename=torrent.hash) }}" class="torrent-title mb-3">
                        {{ torrent.file_name }}
                    </a>
                    <div class="torrent-meta-grid">
                        <div class="meta-item">
                            <label>CAT</label>
                            <span>{{ torrent.category }}</span>
                        </div>
                        <div class="meta-item">
                            <label>BY</label>
                            <a href="{{ url_for('serve_user', username=torrent.submitted_by) }}">{{ torrent.submitted_by }}</a>
                        </div>
                        <div class="meta-item w-100">
                            <label>DATE</label>
                            <span>{{ torrent.timestamp }}</span>
                        </div>
                        {% if torrent.exact_source %}
                            <div class="meta-item">
                                <label>SOURCE</label>
                                <a href="{{ torrent.exact_source }}" target="_blank"><i class="la la-external-link-square"></i></a>
                            </div>
                        {% endif %}
                    </div>                </div>
                <div class="p-4 pt-0 mt-auto">
                    <div class="d-grid">
                        <a href="magnet:?xt=urn:btih:{{ torrent.hash }}&dn={{ torrent.file_name | urlencode }}&tr={{ torrent.announce_url | urlencode }}{{ '&xs=' ~ torrent.exact_source | urlencode if torrent.exact_source else '' }}" class="btn-neon">
                            <i class="la la-magnet"></i> DOWNLOAD
                        </a>
                    </div>
                </div>            </div>
        </div>
    {% endfor %}
</div>

<div class="d-flex justify-content-center mt-5 mb-5">
    {{ pagination.links }}
</div>

<script src="/static/js/torrents.js"></script>
