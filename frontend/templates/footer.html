{% block footer %}
<footer class="footer-neon py-5">
  <div class="container-fluid">
    <div class="row text-center align-items-center">
      <div class="col-md-4 mb-4 mb-md-0 text-md-start">
        <p class="mb-0 text-dim small">
          MADE WITH <span class="text-neon">❤️</span> BY
          <a href="https://peakd.com/@thecrazygm" class="text-neon no-underline ms-1"
            ><i class="cf cf-hive"></i> THECRAZYGM</a
          >
        </p>
      </div>

      <div class="col-md-4 mb-4 mb-md-0">
        <ul class="list-inline text-dim small mb-0 crypto-list">
          <li class="list-inline-item mx-2">
            <i class="cf cf-btc"></i> <span class="address">bc1qnp7jlxqhqky53zum2un3yxkx2v5f39ywwkuqld</span>
          </li>
          <li class="list-inline-item mx-2">
            <i class="cf cf-ltc"></i> <span class="address">LLuRWLt9vy2d9ZpbM566a9AwusRiKSjBae</span>
          </li>
          <li class="list-inline-item mx-2">
            <i class="cf cf-eth"></i> <span class="address">0x6f6E4DEFEDbF0FEE3A1604fC386Dd45B20B81beA</span>
          </li>
        </ul>
      </div>

      <div class="col-md-4 text-md-end">
        <p class="mb-0 text-dim small">
          COPYLEFT <span class="copy-left">&copy;</span> 2026
          <a href="https://peakd.com/@magnetbank" class="text-neon no-underline ms-1"
            ><i class="cf cf-hive"></i> MAGNETBANK</a
          >
        </p>
      </div>
    </div>
  </div>
</footer>

<style>
.footer-neon {
  background: rgba(10, 11, 14, 0.98);
  border-top: 1px solid var(--border-color);
  backdrop-filter: blur(15px);
  margin-top: 5rem;
}

.crypto-list {
    letter-spacing: 1px;
}

.address {
    font-size: 0.65rem;
    opacity: 0.6;
    transition: opacity 0.2s;
}

.address:hover {
    opacity: 1;
    color: var(--neon-green);
}

.footer-neon .text-neon {
    text-shadow: 0 0 5px var(--neon-green-glow);
}
</style>
{% endblock %}
