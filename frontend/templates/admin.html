{% extends "base.html" %}
{% block content %}
    <div class="container py-5">
        <div class="row mb-5">
            <div class="col-12 text-center">
                <h1 class="text-neon display-4 mb-3">COMMAND OVERRIDE: ADMIN</h1>
                <div class="header-line mx-auto"></div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div id="msg_panel" class="status-panel p-3 mb-4 d-none">
                    <span id="msg_text" class="text-neon-input"></span>
                </div>

                <div class="status-panel p-4 p-md-5 text-center" id="login_panel">
                    <h3 class="text-neon mb-4"><i class="la la-user-shield"></i> AUTHENTICATION REQUIRED</h3>
                    <p class="text-dim mb-4">Access restricted to authorized operator: <span class="text-neon">@{{ admin }}</span></p>
                    <button
                        type="button"
                        class="btn-neon px-5 py-3"
                        id="send_signature"
                    >
                        SIGN SIGNATURE
                    </button>
                </div>

                <div class="status-panel p-4 p-md-5 d-none" id="admin_panel">
                    <h3 class="text-neon mb-4"><i class="la la-terminal"></i> DATABASE MANIPULATION</h3>

                    <form id="admin_form">
                        <input type="hidden" id="username" value="{{ admin }}" />

                        <div class="row g-4">
                            <div class="col-md-6">
                                <label for="action" class="form-label text-dim small">PROTOCOL ACTION</label>
                                <select id="action" class="form-select bg-dark border-secondary text-neon-input">
                                    <option value="update">UPDATE CATEGORY</option>
                                    <option value="delete">DELETE ENTRY</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="hash" class="form-label text-dim small">TARGET HASH</label>
                                <input
                                    type="text"
                                    id="hash"
                                    class="form-control bg-dark border-secondary text-neon-input"
                                    placeholder="00000000..."
                                    required
                                />
                            </div>
                            <div class="col-12" id="category_field">
                                <label for="category" class="form-label text-dim small">NEW CLASSIFICATION</label>
                                <select
                                    class="form-select bg-dark border-secondary text-neon-input"
                                    id="category"
                                >
                                    <option value="VIDEO">VIDEO</option>
                                    <option value="AUDIO">AUDIO</option>
                                    <option value="APP">APP</option>
                                    <option value="TEXT">TEXT</option>
                                    <option value="OTHER">OTHER</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="custom_json" class="form-label text-dim small">GENERATED PAYLOAD</label>
                                <textarea
                                    id="custom_json"
                                    class="form-control bg-dark border-secondary text-dim small"
                                    required
                                    rows="3"
                                    readonly
                                ></textarea>
                            </div>
                            <div class="col-12 mt-5">
                                <button type="button" class="btn-neon w-100 py-3" id="send_custom">
                                    BROADCAST OVERRIDE
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
    <script>
    // Simple UI toggles for action types
        document.getElementById('action').addEventListener('change', function(e) {
            const catField = document.getElementById('category_field');
            if (e.target.value === 'delete') {
                catField.classList.add('d-none');
            } else {
                catField.classList.remove('d-none');
            }
        });
    </script>
{% endblock %}
